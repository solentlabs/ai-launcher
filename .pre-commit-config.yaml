# Pre-commit hooks for ai-launcher
# Install: pip install pre-commit && pre-commit install --hook-type pre-commit --hook-type pre-push
# Run manually: pre-commit run --all-files

ci:
  autofix_prs: true
  autoupdate_schedule: weekly

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: detect-private-key
      - id: check-symlinks
      - id: check-executables-have-shebangs
      - id: no-commit-to-branch
        args: [--branch, main]

  # Python-specific checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-ast
      - id: check-docstring-first
      - id: debug-statements
      - id: name-tests-test
        args: [--pytest-test-first]

  # Ruff linter (replaces flake8, isort, bandit)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Type checking with mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-toml
        args:
          - --ignore-missing-imports
          - --no-strict-optional
          - --warn-unused-ignores
        exclude: ^tests/

  # Detect secrets
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']

  # Conventional commits
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.27.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

  # Pre-push hooks
  - repo: local
    hooks:
      - id: verify-tag-ci
        name: Verify CI passed before tag push
        entry: bash scripts/verify-tag-ci.sh
        language: system
        stages: [pre-push]
        always_run: true
        pass_filenames: false

      - id: ci-local
        name: Run local CI checks before push
        entry: bash scripts/ci-local.sh
        language: system
        stages: [pre-push]
        always_run: true
        pass_filenames: false
