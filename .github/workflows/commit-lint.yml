name: Commit Lint

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  pr-title:
    name: Validate PR title (Conventional Commits)
    runs-on: ubuntu-latest
    steps:
      # Squash-merge uses the PR title as the commit message that lands
      # on main. Reject titles that don't follow Conventional Commits so
      # the history stays parseable for release tooling.
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            refactor
            test
            chore
          requireScope: false
          subjectPattern: ^[A-Za-z0-9].+$
          subjectPatternError: |
            PR title subject must start with an alphanumeric character.
            Format: <type>: <subject>
            Allowed types: feat, fix, docs, refactor, test, chore
            Example: "fix: prevent launch box overflow on long paths"
